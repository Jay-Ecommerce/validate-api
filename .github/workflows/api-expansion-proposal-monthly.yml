name: Monthly API expansion proposal

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of the month, 09:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/marketing/api-expansion-proposal.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
