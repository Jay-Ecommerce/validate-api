name: Dev.to weekly article

on:
  schedule:
    - cron: "17 9 * * 2" # Tuesdays 09:17 UTC — offset off :00 since round-minute schedules see heavy GH-wide contention (this one ran 4h late on 07-14 and was dropped entirely on 07-21)
  workflow_dispatch:
    inputs:
      article_index:
        description: "Optional: index into DEVTO_ARTICLES to post a specific article instead of the weekly rotation pick"
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/marketing/devto-post.mjs
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          ARTICLE_INDEX: ${{ github.event.inputs.article_index }}
