name: LinkedIn 3x/week posts

# Schedule disabled 2026-07-11: LinkedIn's Share API requires posting to a
# Company Page, which this account doesn't have yet (needs more connections
# first). Re-add the schedule block below once the Company Page exists.
#  schedule:
#    - cron: "0 14 * * 1" # Monday 14:00 UTC
#    - cron: "0 14 * * 3" # Wednesday 14:00 UTC
#    - cron: "0 14 * * 5" # Friday 14:00 UTC
on:
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/marketing/linkedin-post.mjs
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
