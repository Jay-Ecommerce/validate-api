name: LinkedIn 3x/week posts

# Schedule re-enabled 2026-07-21: the JayEdge Company Page now exists, so
# posting-as-organization (see linkedin-post.mjs) is possible once
# LINKEDIN_ACCESS_TOKEN and LINKEDIN_ORG_URN are set as repo secrets (see
# docs/linkedin-setup.md). Until those secrets exist, these runs will fail
# fast with a clear "not set" message rather than post anything.
#
# Offset off round minutes (:12/:19/:26, not :00) since GitHub Actions
# schedules are best-effort and round-minute triggers see heavy global
# contention — this bit the Dev.to weekly workflow (silently didn't fire one
# week) before the same fix was applied there.
on:
  schedule:
    - cron: "12 14 * * 1" # Monday 14:12 UTC
    - cron: "19 14 * * 3" # Wednesday 14:19 UTC
    - cron: "26 14 * * 5" # Friday 14:26 UTC
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/marketing/linkedin-post.mjs
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
